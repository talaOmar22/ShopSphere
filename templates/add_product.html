<!DOCTYPE html>
<html>
<head>

    <title>Add Product</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>
<body>
<div class="navbar">

    <a href="/">Home</a>

    <a href="/products-page">Products</a>

</div>

<div class="container">

    <h1>Add Product</h1>

    <div class="card">

        <form method="POST">

            <p>ID</p>
            <input type="text" name="id">

            <p>Name</p>
            <input type="text" name="name">

            <p>Category</p>
            <input type="text" name="category">

            <p>Price</p>
            <input type="number" name="price">

            <p>Stock</p>
            <input type="number" name="stock">

            <br><br>

            <button type="submit">
                Add Product
            </button>

        </form>

    </div>

</div>

</body>
</html>
